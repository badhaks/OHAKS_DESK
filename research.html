<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHAKS_Desk — 리서치</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090C;--s1:#0F1117;--s2:#161820;--s3:#1E2028;
  --b1:#2E3240;--b2:#3D4255;
  --t1:#F0F2FF;--t2:#A0A8C0;--t3:#606880;
  --green:#22C55E;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.2);
  --red:#EF4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.2);
  --blue:#6366F1;--blue-bg:rgba(99,102,241,.12);--blue-border:rgba(99,102,241,.25);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,.1);--amber-border:rgba(245,158,11,.25);
  --ui:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t2);font-family:var(--ui);font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}
.up{color:var(--green)!important}.dn{color:var(--red)!important}.neu{color:var(--t3)!important}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;height:52px;background:rgba(8,9,12,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 20px;gap:6px}
.logo{font-size:15px;font-weight:800;letter-spacing:-.03em;white-space:nowrap;margin-right:16px;cursor:pointer;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo em{background:linear-gradient(135deg,#6366F1,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.nav-links{display:flex;gap:2px}
.nl{font-size:12px;font-weight:500;color:var(--t3);padding:6px 11px;border-radius:var(--r8);cursor:pointer;transition:all .15s;white-space:nowrap}
.nl:hover{color:var(--t2);background:var(--s3)}.nl.act{color:var(--t1);background:var(--s3)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--t3);padding:4px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--b1)}
.c-dot{width:5px;height:5px;border-radius:50%}.c-dot.open{background:var(--green);box-shadow:0 0 5px var(--green);animation:glow 2s infinite}.c-dot.closed{background:var(--b2)}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}
.clk{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.04em}
.kis-pill{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;color:var(--t3);transition:all .15s}
.kis-pill:hover{border-color:var(--b2);color:var(--t2)}.kis-pill.active{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}

/* TAPE */
.tape{height:28px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,.04);overflow:hidden}
.tape-inner{display:inline-flex;white-space:nowrap;animation:sc 90s linear infinite}
@keyframes sc{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 16px;height:28px;border-right:1px solid rgba(255,255,255,.04)}
.ti-sym{font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--t3);text-transform:uppercase}
.ti-val{font-family:var(--mono);font-size:11px;color:var(--t1)}
.ti-chg{font-size:9px;font-weight:500}.ti-chg.up{color:var(--green)}.ti-chg.dn{color:var(--red)}.ti-chg.neu{color:var(--t3)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 80px);overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--s1);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow:hidden}
.sb-header{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-tabs{display:flex;gap:4px;margin-bottom:10px}
.sb-tab{flex:1;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:7px 4px;border-radius:var(--r8);cursor:pointer;text-align:center;transition:all .15s}
.sb-tab:hover{color:var(--t2);background:var(--s2)}.sb-tab.act{color:var(--t1);background:var(--s2)}
.sb-search input{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r8);font-size:11px;color:var(--t1);outline:none;font-family:var(--mono)}
.sb-search input:focus{border-color:var(--blue)}
.sb-list{flex:1;overflow-y:auto}
.sym-row{padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;display:flex;align-items:center;justify-content:space-between}
.sym-row:hover{background:var(--s2)}.sym-row.act{background:var(--s2);border-left:2px solid var(--blue)}
.sr-main{display:flex;flex-direction:column;gap:3px}
.sr-sym{font-size:12px;font-weight:700;color:var(--t1)}
.sr-name{font-size:10px;color:var(--t3)}
.sr-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.sr-rating{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px}
.sr-rating.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.sr-rating.hold{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.sr-rating.sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.sr-price{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* DETAIL */
.detail{flex:1;overflow-y:auto;background:var(--bg)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--t3)}
.empty-icon{font-size:40px;opacity:.3}
.empty-text{font-size:14px}

/* STOCK HEADER */
.stock-hero{background:var(--s1);border-bottom:1px solid rgba(255,255,255,.05);padding:20px 24px}
.sh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.sh-info{display:flex;flex-direction:column;gap:4px}
.sh-sym{font-size:28px;font-weight:800;letter-spacing:-.03em;color:var(--t1)}
.sh-name{font-size:14px;color:var(--t3)}
.sh-tags{display:flex;gap:6px;margin-top:6px}
.tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.sh-price-box{text-align:right}
.sh-price{font-family:var(--mono);font-size:34px;font-weight:400;color:var(--t1);letter-spacing:-.02em}
.sh-chg{font-size:13px;font-weight:600;margin-top:4px}
.sh-chg.up{color:var(--green)}.sh-chg.dn{color:var(--red)}
.sh-rating-box{display:flex;align-items:center;gap:10px;padding:14px 0 0;border-top:1px solid rgba(255,255,255,.05)}
.sh-rtg{font-size:13px;font-weight:700;padding:6px 18px;border-radius:var(--r8)}
.sh-rtg.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.sh-rtg.hold{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.sh-tp{font-size:13px;font-weight:600;color:var(--t2)}
.sh-thesis{font-size:12px;color:var(--t3);line-height:1.7;flex:1}

/* DETAIL CONTENT */
.detail-body{padding:16px 24px 40px;display:flex;flex-direction:column;gap:12px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.card{background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:var(--r16);overflow:hidden}
.card-head{height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.ch-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
.bull-bear{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1)}
.bb-col{background:var(--s1);padding:14px 16px}
.bb-head{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.bb-head.up{color:var(--green)}.bb-head.dn{color:var(--red)}
.bb-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px;font-size:11px;line-height:1.6;color:var(--t2)}
.bb-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.bb-dot.up{background:var(--green)}.bb-dot.dn{background:var(--red)}

/* TABLE */
.ds-table{width:100%;border-collapse:collapse}
.ds-table th{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left;white-space:nowrap}
.ds-table td{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2);font-size:12px}
.ds-table tr:last-child td{border-bottom:none}
.ds-table tr:hover td{background:rgba(255,255,255,.02)}
.ds-table td.hl{background:rgba(99,102,241,.06)!important}
.mono{font-family:var(--mono)}
.badge{font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-flex;white-space:nowrap}
.badge.up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge.dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge.neu{background:var(--s3);color:var(--t3);border:1px solid var(--b1)}
.badge.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* MULT BARS */
.mult-bar-wrap{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:4px}
.mult-bar{height:100%;border-radius:2px;background:var(--blue)}

/* GRID */
.row{display:grid;gap:10px}
.row-2{grid-template-columns:1fr 1fr}

/* KIS PANEL */
#kis-panel{display:none;position:fixed;top:0;right:0;width:300px;height:100vh;background:var(--s1);border-left:1px solid rgba(255,255,255,.06);z-index:999;padding:22px 18px;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.kp-close{font-size:11px;color:var(--t3);cursor:pointer;margin-bottom:18px;display:block;font-weight:500}.kp-close:hover{color:var(--t1)}
.kp-title{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:3px}
.kp-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.kp-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:12px 0 4px}
.kp-in{width:100%;padding:9px 12px;border:1px solid var(--b1);background:var(--s2);border-radius:var(--r8);font-family:var(--mono);font-size:12px;color:var(--t1);outline:none;transition:border-color .15s}.kp-in:focus{border-color:var(--blue)}
.kp-save{width:100%;padding:11px;background:linear-gradient(135deg,var(--blue),#4F46E5);color:#fff;border:none;cursor:pointer;margin-top:14px;border-radius:var(--r8);font-size:12px;font-weight:600}

/* MOBILE NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(15,17,23,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);grid-template-columns:repeat(6,1fr);height:56px}
.bni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:5px;transition:background .15s;border-right:1px solid rgba(255,255,255,.04)}
.bni:last-child{border-right:none}.bni:hover,.bni.act{background:var(--s2)}
.bni-icon{font-size:15px;line-height:1}.bni-label{font-size:7.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}.bni.act .bni-label{color:var(--t1)}

@media(max-width:960px){.bnav{display:grid!important}.nav-links{display:none!important}body{padding-bottom:56px}.sidebar{width:180px;min-width:180px}.sr-name{display:none}}
@media(max-width:600px){.sidebar{display:none}.layout{height:calc(100vh - 80px - 56px)}}
</style>
</head>

<script>
function tick(){
  const now=new Date(),kst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'})),et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=`${p(kst.getHours())}:${p(kst.getMinutes())}:${p(kst.getSeconds())}`;
  const kH=kst.getHours()*60+kst.getMinutes(),kD=kst.getDay(),kO=kD>=1&&kD<=5&&kH>=540&&kH<930;
  document.getElementById('kr-dot').className='c-dot '+(kO?'open':'closed');
  document.getElementById('kr-st').textContent='KRX '+(kO?'OPEN':'CLOSED');
  const uH=et.getHours()*60+et.getMinutes(),uD=et.getDay(),uO=uD>=1&&uD<=5&&uH>=570&&uH<960;
  document.getElementById('us-dot').className='c-dot '+(uO?'open':'closed');
  document.getElementById('us-st').textContent='NYSE '+(uO?'OPEN':'CLOSED');
  setTimeout(tick,1000);
}
tick();

let curTab='us',activeStock=null;

function switchTab(t){
  curTab=t;
  ['us','kr'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('act',x===t));
  renderList();
}

function filterList(v){
  const fl=v.toLowerCase();
  const items=COVERAGE[curTab];
  renderItems(items.filter(s=>!fl||s.s.toLowerCase().includes(fl)||s.n.toLowerCase().includes(fl)));
}

function renderList(){renderItems(COVERAGE[curTab]);}

function renderItems(items){
  const rtgCls={BUY:'buy',HOLD:'hold',SELL:'sell'};
  document.getElementById('sb-list').innerHTML=items.map(s=>`
    <div class="sym-row${s.s===activeStock?.s?' act':''}" onclick="selectStock('${s.s}')">
      <div class="sr-main"><div class="sr-sym">${s.s}</div><div class="sr-name">${s.n}</div></div>
      <div class="sr-meta">
        <span class="sr-rating ${rtgCls[s.rating]||'neu'}">${s.rating}</span>
        <span class="sr-price" id="live-${s.s}">—</span>
      </div>
    </div>`).join('');
  // Load prices
  items.forEach(s=>fetchAndShowPrice(s.s));
}

async function fetchAndShowPrice(sym){
  const isKR=sym.length===6&&!isNaN(sym);
  const ySym=isKR?sym+'.KS':sym;
  try{
    const enc=encodeURIComponent(ySym);
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d`)}`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return;
    const j=await r.json();
    const meta=j?.chart?.result?.[0]?.meta;if(!meta?.regularMarketPrice)return;
    const cur=meta.regularMarketPrice,prev=meta.regularMarketPreviousClose||cur;
    const chgPct=(cur-prev)/prev*100;
    const el=document.getElementById('live-'+sym);
    if(el)el.textContent=(isKR?'₩':' $')+(isKR?Math.round(cur).toLocaleString('ko-KR'):cur.toFixed(2));
    // update if currently selected
    if(activeStock?.s===sym){
      document.getElementById('sh-price').textContent=(isKR?'₩':'$')+(isKR?Math.round(cur).toLocaleString('ko-KR'):cur.toFixed(2));
      const ce=document.getElementById('sh-chg');
      ce.textContent=(chgPct>=0?'+':'')+chgPct.toFixed(2)+'%';
      ce.className='sh-chg '+(chgPct>=0?'up':'dn');
    }
  }catch(_){}
}

function selectStock(sym){
  const all=[...COVERAGE.us,...COVERAGE.kr];
  const stock=all.find(s=>s.s===sym);if(!stock)return;
  activeStock=stock;
  document.querySelectorAll('.sym-row').forEach(r=>r.classList.toggle('act',r.querySelector('.sr-sym')?.textContent===sym));
  const isKR=sym.length===6&&!isNaN(sym);
  const px=isKR?'₩':'$';
  const rtgCls={BUY:'buy',HOLD:'hold',SELL:'sell'};

  document.getElementById('detail').innerHTML=`
    <div class="stock-hero">
      <div class="sh-top">
        <div class="sh-info">
          <div class="sh-sym">${stock.s}</div>

        </div>
      </div>
      <div class="sh-rating-box">
        <span class="sh-rtg ${rtgCls[stock.rating]}">${stock.rating}</span>
        <span class="sh-tp">TP ${px}${stock.tp.toLocaleString()}</span>
        <span class="sh-thesis">${stock.thesis}</span>
      </div>
    </div>
    <div class="detail-body">
      <!-- BULL / BEAR -->
      <div class="sec-label">투자 논거</div>
      <div class="card">
        <div class="bull-bear">
          <div class="bb-col">
            <div class="bb-head up">▲ BULL CASE</div>
            ${stock.bull.map(b=>`<div class="bb-item"><div class="bb-dot up"></div><span>${b}</span></div>`).join('')}
          </div>
          <div class="bb-col">
            <div class="bb-head dn">▼ BEAR CASE</div>
            ${stock.bear.map(b=>`<div class="bb-item"><div class="bb-dot dn"></div><span>${b}</span></div>`).join('')}
          </div>
        </div>
      </div>

      <!-- FINANCIALS -->
      <div class="sec-label">재무 요약</div>
      <div class="card">
        <table class="ds-table">
          <thead><tr><th>항목</th><th>FY23</th><th>FY24</th><th>FY25E</th></tr></thead>
          <tbody>${stock.fin.map(r=>`<tr><td>${r.l}</td><td class="mono">${r.fy23}</td><td class="mono">${r.fy24}</td><td class="mono up">${r.fy25e}</td></tr>`).join('')}</tbody>
        </table>
      </div>

      <!-- MULTIPLES + PEERS -->
      <div class="row row-2">
        <div>
          <div class="sec-label">밸류에이션</div>
          <div class="card">
            <table class="ds-table">
              <thead><tr><th>지표</th><th>현재</th><th>피어</th></tr></thead>
              <tbody>${stock.mult.map(m=>`
                <tr><td>${m.l}</td><td class="mono ${m.cls}">${m.v}</td><td class="mono neu">${m.p}</td></tr>
              `).join('')}</tbody>
            </table>
          </div>
        </div>
        <div>
          <div class="sec-label">피어 비교</div>
          <div class="card">
            <table class="ds-table">
              <thead><tr><th>종목</th><th>시총</th><th>FwdPE</th><th>Rev성장</th><th>레이팅</th></tr></thead>
              <tbody>${stock.peers.map(p=>`
                <tr><td class="${p.hl?'hl':''}"><strong style="color:var(--t1)">${p.n}</strong></td>
                <td class="mono${p.hl?' hl':''}">${p.cap}</td>
                <td class="mono${p.hl?' hl':''}">${p.fpe}</td>
                <td class="mono up${p.hl?' hl':''}">${p.rev}</td>
                <td class="${p.hl?'hl':''}"><span class="badge ${p.rtg==='BUY'?'buy':p.rtg==='SELL'?'dn':'neu'}">${p.rtg}</span></td></tr>
              `).join('')}</tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;
  fetchAndShowPrice(sym);
}

// TAPE
const tD=[];
const TSYMS=[{s:'^GSPC',l:'S&P'},{s:'^KS11',l:'KOSPI'},{s:'CL=F',l:'WTI'},{s:'GC=F',l:'Gold'},{s:'^VIX',l:'VIX'}];
async function loadTape(){
  for(const s of TSYMS){
    try{
      const enc=encodeURIComponent(s.s);
      const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d`)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;const j=await r.json();const meta=j?.chart?.result?.[0]?.meta;if(!meta?.regularMarketPrice)continue;
      const cur=meta.regularMarketPrice,prev=meta.regularMarketPreviousClose||cur,chgPct=(cur-prev)/prev*100;
      const up=chgPct>=0;
      tD.push({sym:s.l,val:cur.toFixed(2),chg:(up?'+':'')+chgPct.toFixed(2)+'%',up});
      document.getElementById('tape').innerHTML=[...tD,...tD].map(t=>`<div class="ti"><span class="ti-sym">${t.sym}</span><span class="ti-val">${t.val}</span><span class="ti-chg ${t.up?'up':'dn'}">${t.chg}</span></div>`).join('');
    }catch(_){}
  }
}

function toggleKis(){
  const p=document.getElementById('kis-panel');
  p.style.display=(p.style.display==='none'||!p.style.display)?'block':'none';
  if(p.style.display==='block'){document.getElementById('kp-key').value=localStorage.getItem('kis_appkey')||'';document.getElementById('kp-sec').value=localStorage.getItem('kis_appsecret')||'';}
}
async function saveKis(){
  const k=document.getElementById('kp-key').value.trim(),s=document.getElementById('kp-sec').value.trim();
  if(!k||!s)return;
  localStorage.setItem('kis_appkey',k);localStorage.setItem('kis_appsecret',s);
  if(window.KIS){KIS.saveKeys(k,s,'');const ok=await KIS.getToken(true);if(ok){document.getElementById('kis-btn').textContent='KIS ✓';document.getElementById('kis-btn').classList.add('active');}}
}

renderList();
loadTape();
if(window.KIS&&KIS.isTokenValid()){document.getElementById('kis-btn').textContent='KIS ✓';document.getElementById('kis-btn').classList.add('active');}
