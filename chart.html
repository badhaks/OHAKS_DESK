<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHAKS_Desk — 차트</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#08090C;--s1:#0F1117;--s2:#161820;--s3:#1E2028;--s4:#252830;
  --b1:#2E3240;--b2:#3D4255;
  --t1:#F0F2FF;--t2:#A0A8C0;--t3:#606880;
  --green:#22C55E;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.2);
  --red:#EF4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.2);
  --blue:#6366F1;--blue-bg:rgba(99,102,241,.12);
  --amber:#F59E0B;
  --ui:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t2);font-family:var(--ui);font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}
.up{color:var(--green)!important}.dn{color:var(--red)!important}.neu{color:var(--t3)!important}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;height:52px;background:rgba(8,9,12,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 20px;gap:6px}
.logo{font-size:15px;font-weight:800;letter-spacing:-.03em;white-space:nowrap;margin-right:16px;cursor:pointer;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo em{background:linear-gradient(135deg,#6366F1,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.nav-links{display:flex;gap:2px}
.nl{font-size:12px;font-weight:500;color:var(--t3);padding:6px 11px;border-radius:var(--r8);cursor:pointer;transition:all .15s;white-space:nowrap}
.nl:hover{color:var(--t2);background:var(--s3)}.nl.act{color:var(--t1);background:var(--s3)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--t3);padding:4px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--b1)}
.c-dot{width:5px;height:5px;border-radius:50%}
.c-dot.open{background:var(--green);box-shadow:0 0 5px var(--green);animation:glow 2s infinite}
.c-dot.closed{background:var(--b2)}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}
.clk{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.04em}
.kis-pill{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;color:var(--t3);transition:all .15s}
.kis-pill:hover{border-color:var(--b2);color:var(--t2)}.kis-pill.active{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}

/* TAPE */
.tape{height:28px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,.04);overflow:hidden}
.tape-inner{display:inline-flex;white-space:nowrap;animation:sc 90s linear infinite}
.tape-inner:hover{animation-play-state:paused}
@keyframes sc{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 16px;height:28px;border-right:1px solid rgba(255,255,255,.04)}
.ti-sym{font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--t3);text-transform:uppercase}
.ti-val{font-family:var(--mono);font-size:11px;color:var(--t1)}
.ti-chg{font-size:9px;font-weight:500}.ti-chg.up{color:var(--green)}.ti-chg.dn{color:var(--red)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 80px)}
.sidebar{width:220px;min-width:220px;background:var(--s1);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow:hidden}
.sb-tabs{display:flex;padding:10px 10px 0;gap:4px}
.sb-tab{flex:1;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:7px 4px;border-radius:var(--r8);cursor:pointer;text-align:center;transition:all .15s}
.sb-tab:hover{color:var(--t2);background:var(--s2)}.sb-tab.act{color:var(--t1);background:var(--s2)}
.sb-search{padding:10px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-search input{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r8);font-size:11px;color:var(--t1);outline:none;font-family:var(--mono)}
.sb-search input:focus{border-color:var(--blue)}
.sb-list{flex:1;overflow-y:auto}
.sym-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
.sym-row:hover{background:var(--s2)}.sym-row.act{background:var(--s2);border-left:2px solid var(--blue)}
.sr-l{display:flex;flex-direction:column;gap:2px}
.sr-sym{font-size:12px;font-weight:600;color:var(--t1)}
.sr-name{font-size:10px;color:var(--t3)}
.sr-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.sr-val{font-family:var(--mono);font-size:11px;color:var(--t2)}
.sr-chg{font-size:10px;font-weight:600}

/* CHART AREA */
.chart-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chart-header{height:52px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
.ch-sym{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.ch-name{font-size:12px;color:var(--t3);font-weight:400}
.ch-price{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--t1);margin-left:auto}
.ch-chg{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
.ch-chg.up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.ch-chg.dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

/* TOOLBAR */
.toolbar{height:40px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:6px;padding:0 14px;flex-shrink:0}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 2px}
.tb-btn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;color:var(--t3);border:none;background:none;transition:all .15s;white-space:nowrap}
.tb-btn:hover{color:var(--t2);background:var(--s3)}.tb-btn.act{color:var(--t1);background:var(--s3)}
.tb-ind{font-size:10px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer;color:var(--t3);border:1px solid transparent;transition:all .15s}
.tb-ind:hover{color:var(--t2)}.tb-ind.act{color:var(--amber);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}

/* CROSSHAIR INFO */
.cf-bar{height:26px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:16px;padding:0 14px;font-family:var(--mono);font-size:10px;flex-shrink:0}
.cf-item{display:flex;gap:5px}
.cf-lbl{color:var(--t3)}
.cf-val{color:var(--t2)}

/* CHART CONTAINER */
.chart-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#chart-main{flex:1;min-height:0}
#chart-vol{height:72px;flex-shrink:0}

/* OHLCV in header */
.ch-ohlc{display:flex;gap:12px;font-family:var(--mono);font-size:11px}
.ohlc-item span:first-child{color:var(--t3);margin-right:4px}

/* KIS PANEL */
#kis-panel{display:none;position:fixed;top:0;right:0;width:300px;height:100vh;background:var(--s1);border-left:1px solid rgba(255,255,255,.06);z-index:999;padding:22px 18px;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.kp-close{font-size:11px;color:var(--t3);cursor:pointer;margin-bottom:18px;display:block;font-weight:500}
.kp-close:hover{color:var(--t1)}
.kp-title{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:3px}
.kp-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.kp-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:12px 0 4px}
.kp-in{width:100%;padding:9px 12px;border:1px solid var(--b1);background:var(--s2);border-radius:var(--r8);font-family:var(--mono);font-size:12px;color:var(--t1);outline:none;transition:border-color .15s}
.kp-in:focus{border-color:var(--blue)}
.kp-save{width:100%;padding:11px;background:linear-gradient(135deg,var(--blue),#4F46E5);color:#fff;border:none;cursor:pointer;margin-top:14px;border-radius:var(--r8);font-size:12px;font-weight:600}
#kp-st{font-size:10px;min-height:14px;color:var(--t3);margin-top:7px;font-family:var(--mono)}

/* MOBILE NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(15,17,23,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);grid-template-columns:repeat(6,1fr);height:56px}
.bni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:5px;transition:background .15s;border-right:1px solid rgba(255,255,255,.04)}
.bni:last-child{border-right:none}
.bni:hover,.bni.act{background:var(--s2)}
.bni-icon{font-size:15px;line-height:1}
.bni-label{font-size:7.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.bni.act .bni-label{color:var(--t1)}

@media(max-width:960px){
  .bnav{display:grid!important}.nav-links{display:none!important}
  body{padding-bottom:56px}
  .sidebar{width:160px;min-width:160px}
  .sr-name{display:none}
}
@media(max-width:600px){
  .sidebar{display:none}
  .layout{height:calc(100vh - 80px - 56px)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="location.href='index.html'">OHAKS<em>_</em>Desk</div>
  <div class="nav-links">
    <div class="nl" onclick="location.href='index.html'">홈</div>
    <div class="nl act">차트</div>
    <div class="nl" onclick="location.href='macro.html'">매크로</div>
    <div class="nl" onclick="location.href='research.html'">리서치</div>
    <div class="nl" onclick="location.href='quant.html'">퀀트</div>
    <div class="nl" onclick="location.href='portfolio.html'">포트폴리오</div>

  </div>
  <div class="tb-r">
    <div class="chip"><div class="c-dot" id="kr-dot"></div><span id="kr-st">KRX</span></div>
    <div class="chip"><div class="c-dot" id="us-dot"></div><span id="us-st">NYSE</span></div>
    <div class="clk" id="clk">—</div>
    <button class="kis-pill" id="kis-btn" onclick="toggleKis()">⚙ KIS</button>
  </div>
</div>

<div class="tape"><div class="tape-inner" id="tape">
  <div class="ti"><span class="ti-sym">OHAKS_Desk</span><span class="ti-val">차트</span><span class="ti-chg neu">로딩 중...</span></div>
</div></div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-tabs">
      <div class="sb-tab act" id="tab-etf" onclick="switchTab('etf')">ETF</div>
      <div class="sb-tab" id="tab-us" onclick="switchTab('us')">US</div>
      <div class="sb-tab" id="tab-kr" onclick="switchTab('kr')">KR</div>
    </div>
    <div class="sb-search"><input type="text" id="sb-search" placeholder="검색..." oninput="filterList(this.value)"></div>
    <div class="sb-list" id="sb-list"></div>
  </div>

  <!-- CHART AREA -->
  <div class="chart-area">
    <div class="chart-header">
      <div>
        <div class="ch-sym" id="ch-sym">SPY</div>
        <div class="ch-name" id="ch-name">S&P 500 ETF</div>
      </div>
      <div class="ch-ohlc" id="ch-ohlc">
        <div class="ohlc-item"><span>O</span><span id="cf-o">—</span></div>
        <div class="ohlc-item"><span>H</span><span id="cf-h">—</span></div>
        <div class="ohlc-item"><span>L</span><span id="cf-l">—</span></div>
        <div class="ohlc-item"><span>C</span><span id="cf-c">—</span></div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <div class="ch-price" id="ch-price">—</div>
        <div class="ch-chg neu" id="ch-chg">—</div>
      </div>
    </div>

    <div class="toolbar">
      <!-- Chart type -->
      <div class="tb-btn act" id="btn-l" onclick="setChartType('l')">라인</div>

      <div class="tb-sep"></div>
      <!-- Timeframe -->
      <div class="tb-btn act" id="btn-1w" onclick="setTF(7,'1w')">1W</div>
      <div class="tb-btn" id="btn-1m" onclick="setTF(30,'1m')">1M</div>
      <div class="tb-btn" id="btn-3m" onclick="setTF(90,'3m')">3M</div>
      <div class="tb-btn" id="btn-6m" onclick="setTF(180,'6m')">6M</div>
      <div class="tb-btn" id="btn-1y" onclick="setTF(365,'1y')">1Y</div>
      <div class="tb-sep"></div>
      <!-- Indicators -->
      <div class="tb-ind" id="ind-ma" onclick="toggleInd('ma')">MA</div>
      <div class="tb-ind act" id="ind-vol" onclick="toggleInd('vol')">VOL</div>
      <div class="tb-ind" id="ind-bb" onclick="toggleInd('bb')">BB</div>
    </div>

    <div class="chart-wrap">
      <div id="chart-main"></div>
      <div id="chart-vol"></div>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div class="bnav">
  <div class="bni" onclick="location.href='index.html'"><div class="bni-icon">🏠</div><div class="bni-label">홈</div></div>
  <div class="bni act"><div class="bni-icon">📈</div><div class="bni-label">차트</div></div>
  <div class="bni" onclick="location.href='macro.html'"><div class="bni-icon">🌐</div><div class="bni-label">매크로</div></div>
  <div class="bni" onclick="location.href='research.html'"><div class="bni-icon">🔍</div><div class="bni-label">리서치</div></div>
  <div class="bni" onclick="location.href='quant.html'"><div class="bni-icon">⚡</div><div class="bni-label">퀀트</div></div>
  <div class="bni" onclick="location.href='calendar.html'"><div class="bni-icon">📅</div><div class="bni-label">캘린더</div></div>
</div>

<!-- KIS PANEL -->
<div id="kis-panel">
  <span class="kp-close" onclick="toggleKis()">← 닫기</span>
  <div class="kp-title">KIS API</div>
  <div class="kp-sub">한국투자증권 OpenAPI</div>
  <div class="kp-lbl">App Key</div><input class="kp-in" id="kp-key" type="text" placeholder="App Key" spellcheck="false">
  <div class="kp-lbl">App Secret</div><input class="kp-in" id="kp-sec" type="password" placeholder="App Secret">
  <div class="kp-lbl">계좌번호 앞 8자리</div><input class="kp-in" id="kp-acc" type="text" maxlength="8">
  <button class="kp-save" onclick="saveKis()">저장 + 토큰 발급</button>
  <div id="kp-st"></div>
</div>

<script src="kis.js"></script>
<script>
// CLOCK
function tick(){
  const now=new Date(),kst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'})),et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=`${p(kst.getHours())}:${p(kst.getMinutes())}:${p(kst.getSeconds())}`;
  const kH=kst.getHours()*60+kst.getMinutes(),kD=kst.getDay(),kO=kD>=1&&kD<=5&&kH>=540&&kH<930;
  document.getElementById('kr-dot').className='c-dot '+(kO?'open':'closed');
  document.getElementById('kr-st').textContent='KRX '+(kO?'OPEN':'CLOSED');
  const uH=et.getHours()*60+et.getMinutes(),uD=et.getDay(),uO=uD>=1&&uD<=5&&uH>=570&&uH<960;
  document.getElementById('us-dot').className='c-dot '+(uO?'open':'closed');
  document.getElementById('us-st').textContent='NYSE '+(uO?'OPEN':'CLOSED');
  setTimeout(tick,1000);
}
tick();

const SYM={
  etf:[{s:'SPY',n:'S&P 500 ETF',d:2},{s:'QQQ',n:'NASDAQ 100',d:2},{s:'IWM',n:'Russell 2000',d:2},{s:'XLK',n:'Tech ETF',d:2},{s:'GLD',n:'Gold ETF',d:2},{s:'TLT',n:'Long-Term Bond',d:2}],
  us:[{s:'NVDA',n:'NVIDIA',d:2},{s:'MSFT',n:'Microsoft',d:2},{s:'AAPL',n:'Apple',d:2},{s:'AMZN',n:'Amazon',d:2},{s:'META',n:'Meta',d:2},{s:'GOOGL',n:'Alphabet',d:2},{s:'TSLA',n:'Tesla',d:2},{s:'AMD',n:'AMD',d:2},{s:'TSM',n:'TSMC ADR',d:2},{s:'AVGO',n:'Broadcom',d:2}],
  kr:[{s:'005930.KS',n:'삼성전자',d:0},{s:'000660.KS',n:'SK하이닉스',d:0},{s:'035420.KS',n:'NAVER',d:0},{s:'035720.KS',n:'카카오',d:0},{s:'005380.KS',n:'현대차',d:0},{s:'207940.KS',n:'삼성바이오',d:0},{s:'066570.KS',n:'LG전자',d:0}]
};
let curTab='etf',activeSym=null,tfDays=7,chartType='l',ind={ma:false,vol:true,bb:false};
let mainChart=null,volChart=null,cSeries=null,lSeries=null,vSeries=null,ma20s=null,ma50s=null,bbU=null,bbL=null;
let priceCache={};

function initCharts(){
  const bg='#08090C',grid='rgba(255,255,255,.04)',tc='#606880';
  const base={layout:{background:{color:bg},textColor:tc},grid:{vertLines:{color:grid},horzLines:{color:grid}},crosshair:{mode:0},timeScale:{borderColor:grid,timeVisible:true},rightPriceScale:{borderColor:grid},handleScroll:true,handleScale:true};
  mainChart=LightweightCharts.createChart(document.getElementById('chart-main'),{...base});
  lSeries=mainChart.addLineSeries({color:'#6366F1',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
  cSeries=mainChart.addCandlestickSeries({upColor:'#22C55E',downColor:'#EF4444',borderUpColor:'#22C55E',borderDownColor:'#EF4444',wickUpColor:'#22C55E',wickDownColor:'#EF4444',priceLineVisible:false,lastValueVisible:true,visible:false});
  ma20s=mainChart.addLineSeries({color:'rgba(245,158,11,.7)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,visible:false});
  ma50s=mainChart.addLineSeries({color:'rgba(99,102,241,.7)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,visible:false});
  bbU=mainChart.addLineSeries({color:'rgba(99,102,241,.35)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,visible:false});
  bbL=mainChart.addLineSeries({color:'rgba(99,102,241,.35)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,visible:false});
  volChart=LightweightCharts.createChart(document.getElementById('chart-vol'),{...base,height:72});
  vSeries=volChart.addHistogramSeries({color:'rgba(99,102,241,.4)',priceFormat:{type:'volume'},priceScaleId:''});
  volChart.priceScale('').applyOptions({scaleMargins:{top:.8,bottom:0}});

  mainChart.subscribeCrosshairMove(({seriesData})=>{
    const d=seriesData.get(chartType==='c'?cSeries:lSeries);if(!d)return;
    const fmt=n=>n==null?'—':n.toFixed(2);
    document.getElementById('cf-o').textContent=fmt(d.open||d.value);
    document.getElementById('cf-h').textContent=fmt(d.high||d.value);
    document.getElementById('cf-l').textContent=fmt(d.low||d.value);
    document.getElementById('cf-c').textContent=fmt(d.close||d.value);
  });
  mainChart.timeScale().subscribeVisibleLogicalRangeChange(()=>{
    volChart.timeScale().setVisibleLogicalRange(mainChart.timeScale().getVisibleLogicalRange());
  });
  new ResizeObserver(()=>{
    const m=document.getElementById('chart-main');
    const v=document.getElementById('chart-vol');
    if(m&&mainChart) mainChart.resize(m.clientWidth,m.clientHeight);
    if(v&&volChart) volChart.resize(v.clientWidth,72);
  }).observe(document.getElementById('chart-main'));
}

function setChartType(t){
  chartType=t;
  ['l','c'].forEach(x=>{const b=document.getElementById('btn-'+x);if(b)b.classList.toggle('act',x===t)});
  if(cSeries){cSeries.applyOptions({visible:t==='c'});lSeries.applyOptions({visible:t==='l'});}
}

let curTFKey='1w';
function setTF(days,key){
  tfDays=days;curTFKey=key;
  ['1w','1m','3m','6m','1y'].forEach(k=>{const b=document.getElementById('btn-'+k);if(b)b.classList.toggle('act',k===key)});
  if(activeSym)loadChart(activeSym);
}

function toggleInd(k){
  ind[k]=!ind[k];
  document.getElementById('ind-'+k).classList.toggle('act',ind[k]);
  if(k==='vol'){document.getElementById('chart-vol').style.display=ind.vol?'block':'none';}
  if(k==='ma'){ma20s?.applyOptions({visible:ind.ma});ma50s?.applyOptions({visible:ind.ma});}
  if(k==='bb'){bbU?.applyOptions({visible:ind.bb});bbL?.applyOptions({visible:ind.bb});}
}

async function fetchYahoo(sym,range='3mo'){
  const enc=encodeURIComponent(sym);
  const ival=tfDays<=7?'15m':tfDays<=30?'1h':'1d';
  const urls=[
    `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=${ival}&range=${range}`)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=${ival}&range=${range}`)}`,
  ];
  for(const u of urls){
    try{
      const r=await fetch(u,{signal:AbortSignal.timeout(12000)});if(!r.ok)continue;
      const j=await r.json();
      const res=j?.chart?.result?.[0];if(!res)continue;
      const ts=res.timestamps||res.timestamp;
      const q=res.indicators?.quote?.[0];
      if(!ts||!q)continue;
      return{ts,open:q.open,high:q.high,low:q.low,close:q.close,volume:q.volume,meta:res.meta};
    }catch(_){}
  }return null;
}

function calcMA(close,n){const ma=[];for(let i=0;i<close.length;i++){if(i<n-1){ma.push(null);continue;}const sl=close.slice(i-n+1,i+1).filter(v=>v!=null);ma.push(sl.length===n?sl.reduce((a,b)=>a+b,0)/n:null);}return ma;}
function calcBB(close,n=20,sd=2){const ma=calcMA(close,n);return ma.map((m,i)=>{if(!m)return{u:null,l:null};const sl=close.slice(Math.max(0,i-n+1),i+1).filter(v=>v!=null);const std=Math.sqrt(sl.reduce((a,v)=>{const d=v-m;return a+d*d},0)/sl.length);return{u:m+sd*std,l:m-sd*std};});}

async function loadChart(sym){
  const rangeMap={7:'5d',30:'1mo',90:'3mo',180:'6mo',365:'1y'};
  const data=await fetchYahoo(sym,rangeMap[tfDays]||'3mo');
  if(!data)return;
  const {ts,open,high,low,close,volume,meta}=data;
  const fmt=v=>v!=null&&!isNaN(v)?v:null;
  const candles=[],lines=[],vols=[];
  ts.forEach((t,i)=>{
    const c=fmt(close[i]),o=fmt(open[i]),h=fmt(high[i]),l=fmt(low[i]),v=fmt(volume[i]);
    if(c==null)return;
    const time=t;
    candles.push({time,open:o||c,high:h||c,low:l||c,close:c});
    lines.push({time,value:c});
    if(v!=null)vols.push({time,value:v,color:c>=(o||c)?'rgba(34,197,94,.35)':'rgba(239,68,68,.35)'});
  });
  if(!candles.length)return;
  cSeries.setData(candles);lSeries.setData(lines);
  if(ind.vol)vSeries.setData(vols);
  const closes=candles.map(c=>c.close);
  if(ind.ma){
    const ma20=calcMA(closes,20),ma50=calcMA(closes,50);
    ma20s.setData(candles.map((c,i)=>({time:c.time,value:ma20[i]})).filter(d=>d.value));
    ma50s.setData(candles.map((c,i)=>({time:c.time,value:ma50[i]})).filter(d=>d.value));
  }
  if(ind.bb){
    const bb=calcBB(closes);
    bbU.setData(candles.map((c,i)=>({time:c.time,value:bb[i]?.u})).filter(d=>d.value));
    bbL.setData(candles.map((c,i)=>({time:c.time,value:bb[i]?.l})).filter(d=>d.value));
  }
  mainChart.timeScale().fitContent();
  const cur=meta?.regularMarketPrice||candles[candles.length-1]?.close;
  const prev=meta?.chartPreviousClose||meta?.regularMarketPreviousClose||candles[candles.length-2]?.close||cur;
  const chgPct=prev?(cur-prev)/prev*100:0;
  const isKR=sym.includes('.KS')||sym.includes('.KQ');
  const fmtP=v=>isKR?Math.round(v).toLocaleString('ko-KR'):v?.toFixed(2);
  document.getElementById('ch-price').textContent=(isKR?'₩':'$')+fmtP(cur);
  const ce=document.getElementById('ch-chg');
  ce.textContent=(chgPct>=0?'+':'')+chgPct.toFixed(2)+'%';
  ce.className='ch-chg '+(chgPct>=0?'up':'dn');
  // Update row in sidebar
  const row=document.querySelector(`.sym-row[data-sym="${sym}"]`);
  if(row){
    const rv=row.querySelector('.sr-val');const rc=row.querySelector('.sr-chg');
    if(rv)rv.textContent=(isKR?'₩':'$')+fmtP(cur);
    if(rc){rc.textContent=(chgPct>=0?'+':'')+chgPct.toFixed(2)+'%';rc.className='sr-chg '+(chgPct>=0?'up':'dn');}
  }
}

function switchTab(tab){
  curTab=tab;
  ['etf','us','kr'].forEach(t=>{const b=document.getElementById('tab-'+t);if(b)b.classList.toggle('act',t===tab)});
  renderList();
}

function renderList(filter=''){
  const items=SYM[curTab]||[];
  const fl=filter.toLowerCase();
  document.getElementById('sb-list').innerHTML=items
    .filter(s=>!fl||s.s.toLowerCase().includes(fl)||s.n.toLowerCase().includes(fl))
    .map(s=>`<div class="sym-row${s.s===activeSym?' act':''}" data-sym="${s.s}" onclick="selectSym('${s.s}','${s.n}')">
      <div class="sr-l"><div class="sr-sym">${s.s.replace('.KS','').replace('.KQ','')}</div><div class="sr-name">${s.n}</div></div>
      <div class="sr-r"><div class="sr-val">—</div><div class="sr-chg neu">—</div></div>
    </div>`).join('');
}

function filterList(v){renderList(v);}

function selectSym(sym,name){
  activeSym=sym;
  document.querySelectorAll('.sym-row').forEach(r=>r.classList.toggle('act',r.dataset.sym===sym));
  document.getElementById('ch-sym').textContent=sym.replace('.KS','').replace('.KQ','');
  document.getElementById('ch-name').textContent=name;
  document.getElementById('ch-price').textContent='—';
  loadChart(sym);
}

// TAPE
const TAPE_SYMS=[{s:'^GSPC',l:'S&P'},{s:'^IXIC',l:'NASDAQ'},{s:'^KS11',l:'KOSPI'},{s:'CL=F',l:'WTI'},{s:'GC=F',l:'Gold'},{s:'^VIX',l:'VIX'}];
const tD=[];
async function fetchY(sym){
  const enc=encodeURIComponent(sym);
  try{
    const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d`)}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const j=await r.json();const meta=j?.chart?.result?.[0]?.meta;if(!meta?.regularMarketPrice)return null;
    const cur=meta.regularMarketPrice,prev=meta.regularMarketPreviousClose||cur;
    return{c:cur,chgPct:(cur-prev)/prev*100};
  }catch(_){return null;}
}
async function loadTape(){
  for(const s of TAPE_SYMS){
    const q=await fetchY(s.s);if(!q)continue;
    const up=q.chgPct>=0;
    tD.push({sym:s.l,val:q.c.toFixed(2),chg:(up?'+':'')+q.chgPct.toFixed(2)+'%',up});
    document.getElementById('tape').innerHTML=[...tD,...tD].map(t=>`<div class="ti"><span class="ti-sym">${t.sym}</span><span class="ti-val">${t.val}</span><span class="ti-chg ${t.up?'up':'dn'}">${t.chg}</span></div>`).join('');
  }
}

function toggleKis(){
  const p=document.getElementById('kis-panel');
  p.style.display=(p.style.display==='none'||!p.style.display)?'block':'none';
  if(p.style.display==='block'){
    document.getElementById('kp-key').value=localStorage.getItem('kis_appkey')||'';
    document.getElementById('kp-sec').value=localStorage.getItem('kis_appsecret')||'';
    document.getElementById('kp-acc').value=localStorage.getItem('kis_accno')||'';
  }
}
async function saveKis(){
  const k=document.getElementById('kp-key').value.trim(),s=document.getElementById('kp-sec').value.trim(),a=document.getElementById('kp-acc').value.trim();
  const st=document.getElementById('kp-st');
  if(!k||!s){st.textContent='Key와 Secret을 입력하세요';st.style.color='var(--red)';return;}
  localStorage.setItem('kis_appkey',k);localStorage.setItem('kis_appsecret',s);if(a)localStorage.setItem('kis_accno',a);
  if(window.KIS){KIS.saveKeys(k,s,a);const ok=await KIS.getToken(true);if(ok){document.getElementById('kis-btn').textContent='KIS ✓';document.getElementById('kis-btn').classList.add('active');setTimeout(()=>document.getElementById('kis-panel').style.display='none',800);}}
  else{st.textContent='저장됨';st.style.color='var(--t3)';}
}
