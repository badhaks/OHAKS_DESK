<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHAKS_Desk — 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090C;--s1:#0F1117;--s2:#161820;--s3:#1E2028;
  --b1:#2E3240;--b2:#3D4255;
  --t1:#F0F2FF;--t2:#A0A8C0;--t3:#606880;
  --green:#22C55E;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.2);
  --red:#EF4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.2);
  --blue:#6366F1;--blue-bg:rgba(99,102,241,.12);--blue-border:rgba(99,102,241,.25);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,.1);--amber-border:rgba(245,158,11,.25);
  --purple:#A855F7;--purple-bg:rgba(168,85,247,.1);--purple-border:rgba(168,85,247,.25);
  --ui:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--t2);font-family:var(--ui);font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;height:52px;background:rgba(8,9,12,.85);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;padding:0 20px;gap:6px}
.logo{font-size:15px;font-weight:800;letter-spacing:-.03em;white-space:nowrap;margin-right:16px;cursor:pointer;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo em{background:linear-gradient(135deg,#6366F1,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.nav-links{display:flex;gap:2px}
.nl{font-size:12px;font-weight:500;color:var(--t3);padding:6px 11px;border-radius:var(--r8);cursor:pointer;transition:all .15s;white-space:nowrap}
.nl:hover{color:var(--t2);background:var(--s3)}.nl.act{color:var(--t1);background:var(--s3)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--t3);padding:4px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--b1)}
.c-dot{width:5px;height:5px;border-radius:50%}.c-dot.open{background:var(--green);box-shadow:0 0 5px var(--green);animation:glow 2s infinite}.c-dot.closed{background:var(--b2)}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}
.clk{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.04em}
.kis-pill{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--b1);background:var(--s2);cursor:pointer;color:var(--t3);transition:all .15s}
.kis-pill:hover{border-color:var(--b2);color:var(--t2)}.kis-pill.active{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}

/* TAPE */
.tape{height:28px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,.04);overflow:hidden}
.tape-inner{display:inline-flex;white-space:nowrap;animation:sc 90s linear infinite}
@keyframes sc{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 16px;height:28px;border-right:1px solid rgba(255,255,255,.04)}
.ti-sym{font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--t3);text-transform:uppercase}
.ti-val{font-family:var(--mono);font-size:11px;color:var(--t1)}
.ti-chg{font-size:9px;font-weight:500}.ti-chg.up{color:var(--green)}.ti-chg.dn{color:var(--red)}.ti-chg.neu{color:var(--t3)}

/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:20px 20px 80px;display:flex;flex-direction:column;gap:12px}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-bar-title{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-right:8px}
.fb{font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--b1);color:var(--t3);background:none;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--b2);color:var(--t2)}
.fb.act.eco{border-color:var(--blue-border);color:var(--blue);background:var(--blue-bg)}
.fb.act.all{border-color:var(--b2);color:var(--t1);background:var(--s2)}
.fb.act.kr{border-color:var(--amber-border);color:var(--amber);background:var(--amber-bg)}
.fb.act.earn{border-color:var(--green-border);color:var(--green);background:var(--green-bg)}
.fb.act.fomc{border-color:var(--purple-border);color:var(--purple);background:var(--purple-bg)}

/* LAYOUT */
.cal-layout{display:grid;grid-template-columns:1fr 340px;gap:12px;align-items:start}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:2px}
.month-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:14px 16px 8px;margin-top:4px}
.event-card{background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:var(--r12);padding:14px 16px;display:grid;grid-template-columns:60px 1fr auto;gap:12px;align-items:start;transition:all .15s;cursor:default}
.event-card:hover{border-color:var(--b1);background:var(--s2)}
.event-card.today{border-color:var(--amber-border);background:linear-gradient(135deg,rgba(245,158,11,.05),transparent)}
.event-card.past{opacity:.45}
.ev-date{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding-top:2px}
.ev-day{font-family:var(--mono);font-size:22px;font-weight:400;color:var(--t1);line-height:1}
.ev-dow{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.ev-today-badge{font-size:8px;font-weight:700;color:var(--amber);letter-spacing:.06em;text-transform:uppercase}
.ev-body{display:flex;flex-direction:column;gap:5px}
.ev-title{font-size:13px;font-weight:600;color:var(--t1)}
.ev-desc{font-size:11px;color:var(--t3)}
.ev-data{display:flex;gap:12px;margin-top:4px}
.ev-kv{display:flex;gap:5px;align-items:center}
.ev-kv-l{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.ev-kv-v{font-family:var(--mono);font-size:11px;color:var(--t2)}
.ev-tag{display:inline-flex;align-items:center}
.tag{font-size:9px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap}
.tag.eco{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.tag.kr{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.tag.earn{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag.fomc{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}

/* SIDEBAR */
.cal-sidebar{display:flex;flex-direction:column;gap:10px;position:sticky;top:92px}
.card{background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:var(--r16);overflow:hidden}
.card-head{height:40px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.ch-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}

/* MINI CALENDAR */
.mini-cal{padding:14px}
.mc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mc-month{font-size:13px;font-weight:700;color:var(--t1)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-dh{font-size:9px;font-weight:600;text-align:center;color:var(--t3);padding:4px 0;letter-spacing:.04em}
.mc-d{font-size:11px;text-align:center;padding:5px 3px;border-radius:6px;cursor:pointer;color:var(--t3);transition:background .1s}
.mc-d:hover{background:var(--s2);color:var(--t2)}
.mc-d.today{background:var(--blue-bg);color:var(--blue);font-weight:700;border:1px solid var(--blue-border)}
.mc-d.has-event{color:var(--t1);font-weight:600}
.mc-d.has-event::after{content:'';display:block;width:3px;height:3px;background:var(--amber);border-radius:50%;margin:1px auto 0}

/* UPCOMING */
.upcoming-list{padding:0}
.upc-item{display:grid;grid-template-columns:48px 1fr;gap:8px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;cursor:pointer;transition:background .1s}
.upc-item:last-child{border-bottom:none}
.upc-item:hover{background:var(--s2)}
.upc-dt{font-family:var(--mono);font-size:10px;color:var(--t3);line-height:1.5}
.upc-title{font-size:12px;font-weight:500;color:var(--t2)}
.upc-tag{font-size:8px;font-weight:600;margin-top:2px;display:inline-block;padding:2px 6px;border-radius:4px}

/* KIS PANEL */
#kis-panel{display:none;position:fixed;top:0;right:0;width:300px;height:100vh;background:var(--s1);border-left:1px solid rgba(255,255,255,.06);z-index:999;padding:22px 18px;overflow-y:auto;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.kp-close{font-size:11px;color:var(--t3);cursor:pointer;margin-bottom:18px;display:block;font-weight:500}.kp-close:hover{color:var(--t1)}
.kp-title{font-size:20px;font-weight:800;color:var(--t1);margin-bottom:3px}
.kp-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.kp-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:12px 0 4px}
.kp-in{width:100%;padding:9px 12px;border:1px solid var(--b1);background:var(--s2);border-radius:var(--r8);font-family:var(--mono);font-size:12px;color:var(--t1);outline:none;transition:border-color .15s}.kp-in:focus{border-color:var(--blue)}
.kp-save{width:100%;padding:11px;background:linear-gradient(135deg,var(--blue),#4F46E5);color:#fff;border:none;cursor:pointer;margin-top:14px;border-radius:var(--r8);font-size:12px;font-weight:600}

/* MOBILE NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:rgba(15,17,23,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);grid-template-columns:repeat(6,1fr);height:56px}
.bni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:5px;transition:background .15s;border-right:1px solid rgba(255,255,255,.04)}
.bni:last-child{border-right:none}.bni:hover,.bni.act{background:var(--s2)}
.bni-icon{font-size:15px;line-height:1}.bni-label{font-size:7.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}.bni.act .bni-label{color:var(--t1)}

@media(max-width:960px){.bnav{display:grid!important}.nav-links{display:none!important}body{padding-bottom:56px}.cal-layout{grid-template-columns:1fr!important}.cal-sidebar{position:static}}
</style>
</head>

<script>
function tick(){
  const now=new Date(),kst=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'})),et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=`${p(kst.getHours())}:${p(kst.getMinutes())}:${p(kst.getSeconds())}`;
  const kH=kst.getHours()*60+kst.getMinutes(),kD=kst.getDay(),kO=kD>=1&&kD<=5&&kH>=540&&kH<930;
  document.getElementById('kr-dot').className='c-dot '+(kO?'open':'closed');
  document.getElementById('kr-st').textContent='KRX '+(kO?'OPEN':'CLOSED');
  const uH=et.getHours()*60+et.getMinutes(),uD=et.getDay(),uO=uD>=1&&uD<=5&&uH>=570&&uH<960;
  document.getElementById('us-dot').className='c-dot '+(uO?'open':'closed');
  document.getElementById('us-st').textContent='NYSE '+(uO?'OPEN':'CLOSED');
  setTimeout(tick,1000);
}
tick();

const TAG_LABELS={eco:'경제지표',kr:'한국',earn:'실적',fomc:'FOMC'};

function setFilter(f){
  curFilter=f;
  document.querySelectorAll('.fb').forEach(b=>{
    b.classList.remove('act');
    if(b.id==='f-'+f){b.classList.add('act',f);}
  });
  renderTimeline();
}

function renderTimeline(){
  const filtered=curFilter==='all'?EVENTS:EVENTS.filter(e=>e.type===curFilter);
  let html='',lastMonth='';
  for(const e of filtered){
    const d=new Date(e.date+'T00:00:00');
    const mon=MONTHS[d.getMonth()]+' '+d.getFullYear();
    if(mon!==lastMonth){html+=`<div class="month-label">${mon}</div>`;lastMonth=mon;}
    const isPast=e.date<today,isToday=e.date===today;
    html+=`<div class="event-card${isToday?' today':''}${isPast?' past':''}">
      <div class="ev-date">
        <div class="ev-day">${String(d.getDate()).padStart(2,'0')}</div>
        <div class="ev-dow">${DOW[d.getDay()]}</div>
        ${isToday?'<div class="ev-today-badge">TODAY</div>':''}
      </div>
      <div class="ev-body">
        <div class="ev-title">${e.title}</div>
        <div class="ev-desc">${e.desc}</div>
        <div class="ev-data">
          <div class="ev-kv"><span class="ev-kv-l">전</span><span class="ev-kv-v">${e.prev}</span></div>
          <div class="ev-kv"><span class="ev-kv-l">예상</span><span class="ev-kv-v">${e.exp}</span></div>
        </div>
      </div>
      <div class="ev-tag"><span class="tag ${e.type}">${TAG_LABELS[e.type]||e.type}</span></div>
    </div>`;
  }
  document.getElementById('timeline').innerHTML=html||'<div style="padding:40px;text-align:center;color:var(--t3)">해당 카테고리 이벤트 없음</div>';
}

function renderMiniCal(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  document.getElementById('mc-title').textContent=`${y}년 ${MONTHS[m]}`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const eventDates=new Set(EVENTS.filter(e=>e.date.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)).map(e=>parseInt(e.date.slice(8))));
  let html='';
  ['일','월','화','수','목','금','토'].forEach(d=>{html+=`<div class="mc-dh">${d}</div>`;});
  for(let i=0;i<first;i++)html+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const dt=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dt===today;
    const hasEv=eventDates.has(d);
    html+=`<div class="mc-d${isToday?' today':''}${hasEv&&!isToday?' has-event':''}">${d}</div>`;
  }
  document.getElementById('mini-cal').innerHTML=`<div class="mc-grid">${html}</div>`;
}

function renderUpcoming(){
  const upcoming=EVENTS.filter(e=>e.date>=today).slice(0,6);
  document.getElementById('upcoming').innerHTML=upcoming.map(e=>{
    const d=new Date(e.date+'T00:00:00');
    const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    return `<div class="upc-item">
      <div class="upc-dt">${mm}/${dd}<br>${DOW[d.getDay()]}</div>
      <div><div class="upc-title">${e.title}</div><span class="upc-tag tag ${e.type}">${TAG_LABELS[e.type]}</span></div>
    </div>`;
  }).join('');
}

// TAPE
const tD=[];
async function loadTape(){
  const syms=[{s:'^GSPC',l:'S&P'},{s:'^KS11',l:'KOSPI'},{s:'CL=F',l:'WTI'},{s:'GC=F',l:'Gold'},{s:'^VIX',l:'VIX'}];
  for(const s of syms){
    try{
      const enc=encodeURIComponent(s.s);
      const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${enc}?interval=1d&range=5d`)}`,{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;const j=await r.json();const meta=j?.chart?.result?.[0]?.meta;if(!meta?.regularMarketPrice)continue;
      const cur=meta.regularMarketPrice,prev=meta.regularMarketPreviousClose||cur,chgPct=(cur-prev)/prev*100;
      const up=chgPct>=0;
      tD.push({sym:s.l,val:cur.toFixed(2),chg:(up?'+':'')+chgPct.toFixed(2)+'%',up});
      document.getElementById('tape').innerHTML=[...tD,...tD].map(t=>`<div class="ti"><span class="ti-sym">${t.sym}</span><span class="ti-val">${t.val}</span><span class="ti-chg ${t.up?'up':'dn'}">${t.chg}</span></div>`).join('');
    }catch(_){}
  }
}

function toggleKis(){
  const p=document.getElementById('kis-panel');
  p.style.display=(p.style.display==='none'||!p.style.display)?'block':'none';
}
function saveKis(){
  const k=document.getElementById('kp-key').value.trim(),s=document.getElementById('kp-sec').value.trim();
  if(k&&s){localStorage.setItem('kis_appkey',k);localStorage.setItem('kis_appsecret',s);}
}

renderTimeline();
renderMiniCal();
renderUpcoming();
loadTape();
if(window.KIS&&KIS.isTokenValid()){document.getElementById('kis-btn').textContent='KIS ✓';document.getElementById('kis-btn').classList.add('active');}
</script>
